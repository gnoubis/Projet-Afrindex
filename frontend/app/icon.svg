<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fond cercle orange -->
  <circle cx="16" cy="16" r="16" fill="#C1440E"/>
  <!-- Globe simplifié (cercle blanc + lignes de latitude/longitude) -->
  <circle cx="16" cy="16" r="9" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Méridien vertical -->
  <ellipse cx="16" cy="16" rx="4" ry="9" stroke="white" stroke-width="1.2" fill="none"/>
  <!-- Latitude centrale -->
  <line x1="7" y1="16" x2="25" y2="16" stroke="white" stroke-width="1.2"/>
  <!-- Latitude haute -->
  <path d="M9.5 11 Q16 9.5 22.5 11" stroke="white" stroke-width="1" fill="none"/>
  <!-- Latitude basse -->
  <path d="M9.5 21 Q16 22.5 22.5 21" stroke="white" stroke-width="1" fill="none"/>
</svg>
