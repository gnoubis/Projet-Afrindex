services:
  db:
    image: pgvector/pgvector:pg16
    container_name: afrindex_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: afrindex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: afrindex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrindex -d afrindex"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: afrindex_redis
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: afrindex_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
    container_name: afrindex_worker
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    container_name: afrindex_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api/v1
      INTERNAL_API_URL: http://backend:8000/api
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:3000"

volumes:
  postgres_data:
