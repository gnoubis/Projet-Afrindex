services:
  db:
    image: pgvector/pgvector:pg16
    container_name: afrindex_db
    environment:
      POSTGRES_USER: afrindex
      POSTGRES_PASSWORD: afrindex
      POSTGRES_DB: afrindex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afrindex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: afrindex_redis
    ports:
      - "6380:6379"

  backend:
    build: ./backend
    container_name: afrindex_backend
    env_file: ./backend/.env
    ports:
      - "8100:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    container_name: afrindex_worker
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: celery -A celery_app worker --loglevel=info

volumes:
  postgres_data:
